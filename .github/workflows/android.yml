name: Android CI

# Temporary fallback: this workflow supports system Gradle until the wrapper
# is bootstrapped and committed. After that, simplify to wrapper-only.

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Grant execute permission for gradlew if present
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: Run ktlint
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew ktlintCheck
          else
            gradle ktlintCheck
          fi

      - name: Run detekt
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew detekt
          else
            gradle detekt
          fi

      - name: Build debug APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
