name: Bootstrap Gradle Wrapper

on:
  workflow_dispatch:
    inputs:
      gradle-version:
        description: "Gradle version to write into the wrapper"
        required: false
        default: "8.7"

permissions:
  contents: write

jobs:
  bootstrap-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ inputs.gradle-version }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version "${{ inputs.gradle-version }}"

      - name: Commit wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          git diff --cached --quiet && echo "No wrapper changes to commit" && exit 0
          git commit -m "chore: add Gradle wrapper"
          git push
